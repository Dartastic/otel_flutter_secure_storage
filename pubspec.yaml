name: otel_flutter_secure_storage
description: OpenTelemetry instrumentation for
  `package:flutter_secure_storage`. Wraps secure-storage reads / writes
  with key-aware spans, NEVER recording the value (credentials).
version: 0.1.0-beta.2-wip
repository: https://github.com/dartastic/otel_flutter_secure_storage
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  dartastic_opentelemetry: ^1.1.0-beta.4
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  dart_flutter_team_lints: ^3.5.2
  flutter_test:
    sdk: flutter
  pub_semver: ^2.0.0
  pubspec_parse: ^1.5.0
